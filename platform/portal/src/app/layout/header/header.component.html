<header class="app-header">
  <div class="flex items-center gap-6">
    <button *ngIf="isSidebarCollapsed" (click)="toggleSidebar.emit()" class="bg-transparent border-0 text-charcoal cursor-pointer text-xl p-2 flex items-center justify-center hover:text-gold transition-colors duration-500">☰</button>
    <h1 class="text-3xl md:text-5xl m-0">{{ title }}</h1>
  </div>
  <div class="flex items-center gap-12">
    <div *ngIf="currentUser" class="flex flex-col items-end leading-tight">
      <span class="text-sm font-playfair italic text-charcoal">{{ currentUser.name }}</span>
      <span class="text-[10px] text-warmgrey uppercase tracking-[0.2em] mt-1">{{ currentUser.role }} • {{ currentUser.email }}</span>
    </div>

    <div class="flex items-center gap-4">
      <div class="h-px w-8 bg-charcoal/20 hidden md:block"></div>
      <span class="text-[10px] uppercase tracking-[0.2em] text-charcoal">Core Online</span>
    </div>
  </div>
</header>
