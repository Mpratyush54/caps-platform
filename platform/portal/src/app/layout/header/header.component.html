<header class="h-16 border-b border-[#333] bg-black/80 backdrop-blur-md sticky top-0 z-30 flex items-center justify-between px-6 transition-all duration-300">
  <div class="flex items-center gap-4">
    <div class="flex items-center gap-2 text-sm text-[#a1a1aa]">
      <span class="hover:text-white cursor-pointer transition-colors">mpratyush54</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
      <span class="text-white bg-[#111] border border-[#333] px-2 py-0.5 rounded-full text-xs font-medium">{{ title }}</span>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <div class="hidden md:flex items-center gap-4 mr-4 text-sm font-medium">
      <a href="https://github.com/Mpratyush54/caps-platform/issues" target="_blank" class="text-[#a1a1aa] hover:text-white transition-colors">Feedback</a>
      <a href="https://github.com/Mpratyush54/caps-platform/releases" target="_blank" class="text-[#a1a1aa] hover:text-white transition-colors">Changelog</a>
      <a href="https://github.com/Mpratyush54/caps-platform/discussions" target="_blank" class="text-[#a1a1aa] hover:text-white transition-colors">Help</a>
      <a routerLink="/docs" class="text-[#a1a1aa] hover:text-white transition-colors">Docs</a>
    </div>

    <div class="w-px h-6 bg-[#333] hidden md:block"></div>

    <button class="relative p-2 text-[#a1a1aa] hover:text-white transition-colors rounded-full hover:bg-[#111]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-blue-500 rounded-full border-2 border-black"></span>
    </button>
    
    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 p-[1px] cursor-pointer">
      <div class="w-full h-full rounded-full bg-black border border-black overflow-hidden flex items-center justify-center">
        <span class="text-xs text-white font-medium">MP</span>
      </div>
    </div>
  </div>
</header>
