<div class="min-h-screen flex items-center justify-center p-4 bg-app" style="background-image: radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%); min-height: 100vh;">
  <div class="card w-full max-w-md p-8" style="background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 24px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);">
    
    <div class="text-center mb-8">
      <h2 style="font-size: 2.25rem; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: none; padding-bottom: 0; margin-bottom: 8px; letter-spacing: -0.04em;">CAPS Platform</h2>
      <p style="color: var(--color-text-secondary); font-size: 0.95rem; margin: 0;">Self-hosted internal PaaS Control Center</p>
      <a routerLink="/landing" style="color: var(--color-text-muted); font-size: 0.8rem; display: inline-block; margin-top: 8px;">View Documentation &rarr;</a>
    </div>

    <div class="form-group mb-6">
      <label>Email Address</label>
      <input type="email" [(ngModel)]="email" placeholder="name@caps.io" (keyup.enter)="login()" style="width: 100%; box-sizing: border-box;">
    </div>

    <div *ngIf="errorMessage" class="mb-4 p-3 text-sm text-red-400 bg-red-950/20 border border-red-900/50 rounded-xl text-center">
      {{ errorMessage }}
    </div>

    <button class="btn btn-primary w-full mb-4" (click)="login()" [disabled]="!email" style="display: flex; width: 100%; justify-content: center; box-sizing: border-box;">
      Sign In
    </button>

    <div class="flex items-center my-6">
      <hr class="flex-grow border-t border-glass" style="border-color: var(--border-glass);">
      <span class="px-3 text-xs text-muted uppercase" style="color: var(--color-text-muted);">or continue with</span>
      <hr class="flex-grow border-t border-glass" style="border-color: var(--border-glass);">
    </div>

    <button class="btn w-full mb-6" (click)="loginWithGitLab()" style="display: flex; width: 100%; justify-content: center; box-sizing: border-box; background: rgba(226, 67, 41, 0.1); border-color: rgba(226, 67, 41, 0.2); color: #fff;">
      <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24" style="width: 20px; height: 20px;">
        <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
      </svg>
      Sign In with GitLab
    </button>

    <div class="mt-4 p-4 rounded-xl border border-glass" style="background: rgba(255, 255, 255, 0.01); border-color: var(--border-glass);">
      <h3 class="text-sm font-semibold mb-3" style="font-size: 0.85rem; text-transform: uppercase; color: var(--color-text-secondary); margin-top: 0; margin-bottom: 12px; font-family: var(--font-heading);">Demo Roles Login</h3>
      <div class="flex flex-col gap-2" style="display: flex; flex-direction: column; gap: 8px;">
        <button *ngFor="let acc of demoAccounts" (click)="login(acc.email)" class="btn btn-sm" style="display: flex; justify-content: space-between; align-items: center; width: 100%; text-align: left; background: rgba(255,255,255,0.03); border-color: var(--border-glass); transition: all 0.2s;">
          <span style="font-weight: 600; color: #fff;">{{ acc.name }}</span>
          <span class="badge badge-active" style="padding: 2px 8px; font-size: 0.65rem;">{{ acc.role }}</span>
        </button>
      </div>
    </div>

  </div>
</div>
