<div class="card">
  <h2>Bootstrap Server</h2>
  <div class="form-group"><label>Hostname</label><input [(ngModel)]="initData.hostname" placeholder="server.internal"></div>
  <div class="form-group"><label>Components</label><input [(ngModel)]="initData.components" placeholder="docker,kubernetes,helm,argocd"></div>
  <button class="btn btn-primary" (click)="init()" [disabled]="!initData.hostname">Bootstrap</button>
</div>

<div class="card" *ngIf="result">
  <h2>Result</h2>
  <pre>{{ result | json }}</pre>
</div>

<div class="card">
  <h2>System Status</h2>
  <button class="btn btn-primary" (click)="checkStatus()">Check Status</button>
  <div *ngFor="let s of statusServices" style="padding:8px 0;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;">
    <span>{{ s.name }}</span>
    <span class="badge" [class.badge-active]="s.status==='running'" [class.badge-failed]="s.status!=='running'">{{ s.status }}</span>
  </div>
</div>
