stages:
  - build
  - test
  - deploy

variables:
  NODE_IMAGE: node:20-alpine

build:
  stage: build
  image: $NODE_IMAGE
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/

test:
  stage: test
  image: $NODE_IMAGE
  script:
    - npm ci
    - npm run test

deploy:
  stage: deploy
  script:
    - curl -X POST "https://platform.internal/api/deploy" -H "Content-Type: application/json" -d '{"projectId":"$CI_PROJECT_NAME","version":"$CI_COMMIT_TAG","branch":"$CI_COMMIT_BRANCH","commitSha":"$CI_COMMIT_SHA"}'
  only:
    - main
