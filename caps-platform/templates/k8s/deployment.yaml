apiVersion: apps/v1
kind: Deployment
metadata:
  name: caps-service
  labels:
    app: caps-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: caps-service
  template:
    metadata:
      labels:
        app: caps-service
    spec:
      containers:
      - name: caps-service
        image: caps/caps-service:latest
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
