<header class="app-header">
  <div style="display:flex;align-items:center;gap:12px;">
    <button *ngIf="isSidebarCollapsed" (click)="toggleSidebar.emit()" style="background:transparent;border:none;color:var(--text-primary);cursor:pointer;font-size:1.1rem;padding:4px 8px;display:flex;align-items:center;justify-content:center;">☰</button>
    <h1 style="font-size:1.15rem;font-weight:700;margin:0;font-family:var(--font-heading);">{{ title }}</h1>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <div *ngIf="currentUser" style="display:flex;flex-direction:column;align-items:flex-end;line-height:1.2;">
      <span style="font-size:0.8rem;font-weight:600;color:var(--text-primary);">{{ currentUser.name }}</span>
      <span style="font-size:0.68rem;color:var(--text-secondary); font-family:var(--font-code);">{{ currentUser.role | uppercase }} • {{ currentUser.email }}</span>
    </div>

    <span class="badge badge-active" style="padding:3px 8px;font-size:0.65rem;">● Core Online</span>
  </div>
</header>
