<div class="card">
  <h2>Runtime Configuration</h2>
  <div class="form-group"><label>Project ID</label><input [(ngModel)]="projectId" placeholder="Enter project ID"></div>
  <button class="btn btn-primary" (click)="load()" [disabled]="!projectId">Load Config</button>
</div>

<div class="card" *ngIf="configEntries.length">
  <h2>Config Values</h2>
  <table>
    <thead><tr><th>Key</th><th>Value</th><th>Secret</th></tr></thead>
    <tbody>
      <tr *ngFor="let c of configEntries">
        <td><code>{{ c.key }}</code></td>
        <td>{{ c.isSecret ? '••••••••' : c.value }}</td>
        <td>{{ c.isSecret ? 'Yes' : 'No' }}</td>
      </tr>
    </tbody>
  </table>
</div>

<div class="card">
  <h2>Set Config</h2>
  <div class="form-group"><label>Key</label><input [(ngModel)]="newConfig.key" placeholder="storage.bucket"></div>
  <div class="form-group"><label>Value</label><input [(ngModel)]="newConfig.value" placeholder="my-bucket"></div>
  <div class="form-group"><label><input type="checkbox" [(ngModel)]="newConfig.isSecret"> Secret</label></div>
  <button class="btn btn-primary" (click)="setConfig()" [disabled]="!projectId || !newConfig.key">Save</button>
</div>
