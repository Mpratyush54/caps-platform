apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical
  namespace: infisical
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infisical
  template:
    metadata:
      labels:
        app: infisical
    spec:
      containers:
      - name: infisical
        image: infisical/infisical:latest-postgres
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: infisical-secrets
        env:
        - name: SITE_URL
          value: "https://infisical.{{DOMAIN}}"
        - name: NODE_ENV
          value: production
        - name: AUTH_METHOD_OIDC_ENABLED
          value: "true"
        - name: CLIENT_ID_OIDC
          value: infisical
        - name: CLIENT_SECRET_OIDC
          value: infisical-secret-placeholder
        - name: ISSUER_OIDC
          value: "https://{{DOMAIN}}/api/oauth"
---
apiVersion: v1
kind: Service
metadata:
  name: infisical
  namespace: infisical
spec:
  selector:
    app: infisical
  ports:
  - port: 8080
    targetPort: 8080
