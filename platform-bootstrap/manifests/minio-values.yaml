ingress:
  enabled: false
extraEnvVars:
  - name: MINIO_BROWSER_REDIRECT_URL
    value: https://minio.{{DOMAIN}}
  - name: MINIO_IDENTITY_OPENID_ENABLE
    value: "on"
  - name: MINIO_IDENTITY_OPENID_CONFIG_URL
    value: http://platform-api.platform.svc.cluster.local:3000/api/oauth/.well-known/openid-configuration
  - name: MINIO_IDENTITY_OPENID_CLIENT_ID
    value: minio
  - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET
    value: minio-secret-placeholder
  - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME
    value: Platform

console:
  extraEnvVars:
    - name: MINIO_IDENTITY_OPENID_ENABLE
      value: "on"
    - name: MINIO_IDENTITY_OPENID_CONFIG_URL
      value: http://platform-api.platform.svc.cluster.local:3000/api/oauth/.well-known/openid-configuration
    - name: MINIO_IDENTITY_OPENID_CLIENT_ID
      value: minio
    - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET
      value: minio-secret-placeholder
    - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME
      value: Platform
    - name: MINIO_IDENTITY_OPENID_REDIRECT_URI
      value: https://minio.{{DOMAIN}}/oauth_callback
